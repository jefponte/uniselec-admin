apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: uniselec-admin-dev

resources:
- ../../base
- namespace.yaml

patches:
- path: patch-deployment.yaml
- path: patch-ingress.yaml
- path: patch-hpa.yaml

configMapGenerator:
- behavior: merge
  literals:
  - LOG_LEVEL="debug"
  - MESSAGE="Serviço Admin Development"
  name: uniselec-admin-config
  options:
    disableNameSuffixHash: true

images:
- name: harbor.unilab.edu.br/unilab/uniselec-admin
  newTag: dev-0148b998
